id: redis-cache
name: Redis Cache
category: caching
description: Redis configured as a dedicated caching layer with eviction policies
is: An in-memory cache that sits between your application and database to reduce load and latency
gain:
  - Dramatically reduces database read load
  - Configurable eviction policies (LRU, LFU, TTL)
  - Supports complex cached data structures
cost:
  - Cache invalidation complexity
  - Additional infrastructure to manage
  - Cold start requires cache warming strategy
tags:
  - cache
  - in-memory
  - performance
  - layer
base_metrics:
  - id: cache-hit-latency
    value: low
    numeric_value: 1
    category: performance
  - id: cache-efficiency
    value: high
    numeric_value: 8
    category: performance
  - id: operational-complexity
    value: low
    numeric_value: 3
    category: operational-complexity
  - id: cache-scalability
    value: medium
    numeric_value: 6
    category: scalability
  - id: cache-cost-efficiency
    value: high
    numeric_value: 7
    category: cost-efficiency
config_variants:
  - id: simple-cache
    name: Simple Key-Value Cache
    metrics:
      - id: cache-hit-latency
        value: low
        numeric_value: 1
        category: performance
      - id: cache-efficiency
        value: medium
        numeric_value: 6
        category: performance
      - id: cache-cost-efficiency
        value: high
        numeric_value: 9
        category: cost-efficiency
    code_snippet:
      language: typescript
      code: |
        // Redis Cache - Simple Key-Value with TTL
        import Redis from 'ioredis'

        const redis = new Redis(process.env.REDIS_URL)
        const TTL = 300 // 5 minutes

        export async function getCached<T>(key: string, fetch: () => Promise<T>): Promise<T> {
          const cached = await redis.get(key)
          if (cached) return JSON.parse(cached) as T
          const data = await fetch()
          await redis.set(key, JSON.stringify(data), 'EX', TTL)
          return data
        }

        export async function invalidate(key: string) {
          await redis.del(key)
        }
    metric_explanations:
      cache-hit-latency:
        reason: Simple key-value cache reads directly from single-node RAM with no lookup complexity, delivering sub-millisecond hit latency.
        contributing_factors:
          - Direct memory read with O(1) key lookup
          - No cross-node coordination required for reads
          - In-process serialization/deserialization is the only overhead
      cache-efficiency:
        reason: Simple cache without tagging or layered keys has lower efficiency because related keys cannot be invalidated atomically on data changes.
        contributing_factors:
          - Key-by-key invalidation is error-prone for complex object graphs
          - No built-in cache warming strategy on cold start
          - TTL-based expiry can serve stale data near expiration boundary
  - id: distributed-cache
    name: Distributed Cache
    metrics:
      - id: cache-hit-latency
        value: low
        numeric_value: 2
        category: performance
      - id: cache-efficiency
        value: high
        numeric_value: 8
        category: performance
      - id: cache-cost-efficiency
        value: medium
        numeric_value: 5
        category: cost-efficiency
    code_snippet:
      language: typescript
      code: |
        // Redis Cache - Distributed with tag-based invalidation
        import Redis from 'ioredis'

        const cluster = new Redis.Cluster([
          { host: process.env.CACHE_NODE_1, port: 6379 },
          { host: process.env.CACHE_NODE_2, port: 6379 },
        ])

        export async function setWithTags(
          key: string, value: unknown, tags: string[], ttl = 300
        ) {
          const pipeline = cluster.pipeline()
          pipeline.set(key, JSON.stringify(value), 'EX', ttl)
          for (const tag of tags) pipeline.sadd(`tag:${tag}`, key)
          await pipeline.exec()
        }

        export async function invalidateByTag(tag: string) {
          const keys = await cluster.smembers(`tag:${tag}`)
          if (keys.length) await cluster.del(...keys)
          await cluster.del(`tag:${tag}`)
        }
    metric_explanations:
      cache-hit-latency:
        reason: Distributed cache adds one slot-routing step compared to single-node, slightly increasing hit latency but still well under 1ms.
        contributing_factors:
          - Cluster slot routing adds one hash-slot lookup per command
          - Pipeline batching amortizes network round-trips for multi-key sets
          - Cross-slot tag invalidation requires coordinating multiple nodes
      cache-efficiency:
        reason: Tag-based invalidation groups related keys for atomic removal, enabling precise cache invalidation that matches application data boundaries.
        contributing_factors:
          - Tag sets map domain objects to all their cached representations
          - Invalidating one entity removes all derived cached views atomically
          - Cache warming on startup can pre-populate high-traffic key patterns
connection_properties:
  protocol: TCP
  communication_patterns:
    - request-response
  typical_latency: "<1ms"
  co_location_potential: true
demand_responses:
  traffic-volume:
    high:
      cache-efficiency: 0.95
    extreme:
      cache-efficiency: 0.9
  data-size:
    high:
      cache-efficiency: 0.7
      operational-complexity: 0.9
    extreme:
      cache-efficiency: 0.5
      operational-complexity: 0.8
  concurrent-users:
    extreme:
      cache-hit-latency: 0.9
  burst-pattern:
    periodic-spikes:
      cache-efficiency: 0.9
    unpredictable:
      cache-efficiency: 0.8
