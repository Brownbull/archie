id: redis
name: Redis
category: data-storage
description: In-memory data structure store used as database, cache, and message broker
is: A blazing-fast in-memory key-value store supporting rich data structures
gain:
  - Sub-millisecond read/write latency
  - Versatile data structures (strings, hashes, lists, sets, sorted sets)
  - Built-in pub/sub and Lua scripting
cost:
  - Dataset limited by available RAM
  - Persistence options trade durability for performance
  - Single-threaded command execution
tags:
  - database
  - nosql
  - in-memory
  - key-value
base_metrics:
  - id: read-latency
    value: low
    numeric_value: 1
    category: performance
  - id: write-throughput
    value: high
    numeric_value: 9
    category: performance
  - id: horizontal-scalability
    value: medium
    numeric_value: 6
    category: scalability
  - id: data-durability
    value: medium
    numeric_value: 5
    category: reliability
  - id: operational-complexity
    value: low
    numeric_value: 3
    category: operational-complexity
config_variants:
  - id: standalone
    name: Standalone
    metrics:
      - id: read-latency
        value: low
        numeric_value: 1
        category: performance
      - id: horizontal-scalability
        value: low
        numeric_value: 2
        category: scalability
    code_snippet:
      language: typescript
      code: |
        // Redis - Standalone via ioredis
        import Redis from 'ioredis'

        const redis = new Redis(process.env.REDIS_URL)

        export async function get(key: string) {
          return redis.get(key)
        }

        export async function set(key: string, value: string, ttl?: number) {
          if (ttl) return redis.set(key, value, 'EX', ttl)
          return redis.set(key, value)
        }
    metric_explanations:
      read-latency:
        reason: Standalone Redis reads from a single in-memory instance, delivering sub-millisecond latency with no network hops.
        contributing_factors:
          - All data stored in RAM eliminates disk I/O
          - Single server has no network routing overhead
          - Predictable response time without replica sync delay
      horizontal-scalability:
        reason: Standalone Redis cannot distribute load across multiple nodes — all operations hit one instance bound by RAM and CPU.
        contributing_factors:
          - Single instance RAM ceiling limits dataset size
          - No automatic data partitioning available
          - Scaling requires migration to Cluster variant
  - id: sentinel
    name: Sentinel HA
    metrics:
      - id: read-latency
        value: low
        numeric_value: 2
        category: performance
      - id: horizontal-scalability
        value: medium
        numeric_value: 5
        category: scalability
    code_snippet:
      language: typescript
      code: |
        // Redis - Sentinel HA via ioredis
        import Redis from 'ioredis'

        const redis = new Redis({
          sentinels: [
            { host: process.env.SENTINEL_1, port: 26379 },
            { host: process.env.SENTINEL_2, port: 26379 },
          ],
          name: 'mymaster',
        })

        export async function get(key: string) {
          return redis.get(key)
        }
    metric_explanations:
      read-latency:
        reason: Sentinel adds failover management overhead and replica reads introduce slight replication lag compared to standalone.
        contributing_factors:
          - Sentinel connection lookup adds one extra network step
          - Replica reads may return slightly stale data due to async replication
          - Failover detection adds brief unavailability window
      horizontal-scalability:
        reason: Sentinel provides high availability via replicas but does not shard data — read scaling is limited to replica count.
        contributing_factors:
          - Replicas can serve read traffic to distribute read load
          - Write traffic remains on single master instance
          - Dataset size still bounded by single node RAM
  - id: cluster
    name: Redis Cluster
    metrics:
      - id: read-latency
        value: low
        numeric_value: 2
        category: performance
      - id: horizontal-scalability
        value: high
        numeric_value: 8
        category: scalability
    code_snippet:
      language: typescript
      code: |
        // Redis - Cluster mode via ioredis
        import Redis from 'ioredis'

        const cluster = new Redis.Cluster([
          { host: process.env.NODE_1, port: 6379 },
          { host: process.env.NODE_2, port: 6379 },
          { host: process.env.NODE_3, port: 6379 },
        ])

        export async function get(key: string) {
          return cluster.get(key)
        }

        export async function set(key: string, value: string) {
          return cluster.set(key, value)
        }
    metric_explanations:
      read-latency:
        reason: Redis Cluster routes keys to specific shards, adding one slot-lookup step compared to standalone but still operating in memory.
        contributing_factors:
          - Slot routing adds minimal overhead per command
          - Cross-slot multi-key operations require additional coordination
          - In-memory execution keeps overall latency very low
      horizontal-scalability:
        reason: Redis Cluster shards data across nodes automatically, enabling true horizontal scaling of both reads and writes.
        contributing_factors:
          - 16384 hash slots distributed across cluster nodes
          - New nodes added to cluster absorb rebalanced slots
          - Each master has replicas for read scaling and failover
connection_properties:
  protocol: TCP
  communication_patterns:
    - request-response
    - pub-sub
  typical_latency: "<1ms"
  co_location_potential: true
