      cost-per-query: 0.5
  traffic-volume:
    high:
      query-latency: 0.8
    extreme:
      query-latency: 0.6
      horizontal-scalability: 0.7
  concurrent-users:
    high:
      query-latency: 0.8
    extreme:
      query-latency: 0.5
failure_responses:
