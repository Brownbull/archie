id: node-express
name: Node.js + Express
category: compute
description: JavaScript runtime with Express web framework for building APIs and web services
is: A lightweight, event-driven server runtime ideal for I/O-heavy workloads and real-time applications
gain:
  - Non-blocking I/O handles thousands of concurrent connections
  - Massive npm ecosystem for rapid development
  - Same language (JavaScript/TypeScript) across frontend and backend
cost:
  - CPU-intensive tasks block the event loop
  - Callback complexity in legacy codebases
  - Single-threaded by default (requires clustering for multi-core)
tags:
  - server
  - javascript
  - api
  - runtime
base_metrics:
  - id: request-latency
    value: low
    numeric_value: 3
    category: performance
  - id: concurrent-connections
    value: high
    numeric_value: 8
    category: scalability
  - id: cpu-efficiency
    value: medium
    numeric_value: 4
    category: performance
  - id: operational-complexity
    value: low
    numeric_value: 3
    category: operational-complexity
  - id: node-cost-efficiency
    value: high
    numeric_value: 8
    category: cost-efficiency
config_variants:
  - id: single-process
    name: Single Process
    metrics:
      - id: concurrent-connections
        value: medium
        numeric_value: 5
        category: scalability
      - id: cpu-efficiency
        value: low
        numeric_value: 3
        category: performance
      - id: node-cost-efficiency
        value: high
        numeric_value: 9
        category: cost-efficiency
    code_snippet:
      language: typescript
      code: |
        // Node.js + Express - Single Process
        import express from 'express'

        const app = express()
        app.use(express.json())

        app.get('/health', (_req, res) => res.json({ status: 'ok' }))

        app.get('/users/:id', async (req, res) => {
          const user = await db.findUser(req.params.id)
          if (!user) return res.status(404).json({ error: 'Not found' })
          res.json(user)
        })

        app.listen(3000, () => console.log('Server ready on :3000'))
    metric_explanations:
      concurrent-connections:
        reason: Single-process Node.js uses one event loop on one CPU core, limiting concurrent request handling when CPU-bound work is present.
        contributing_factors:
          - One event loop processes all callbacks sequentially
          - CPU-intensive handlers block other requests from being served
          - I/O-only workloads handle more concurrency than the metric suggests
      cpu-efficiency:
        reason: A single process uses only one CPU core, leaving remaining cores idle and limiting CPU-bound throughput.
        contributing_factors:
          - JavaScript is single-threaded by design
          - Worker threads needed for CPU work to avoid blocking the event loop
          - Multi-core hardware is underutilized without clustering
  - id: cluster-mode
    name: Cluster Mode
    metrics:
      - id: concurrent-connections
        value: high
        numeric_value: 8
        category: scalability
      - id: cpu-efficiency
        value: medium
        numeric_value: 6
        category: performance
      - id: node-cost-efficiency
        value: high
        numeric_value: 7
        category: cost-efficiency
    code_snippet:
      language: typescript
      code: |
        // Node.js + Express - Cluster Mode
        import cluster from 'cluster'
        import os from 'os'
        import express from 'express'

        if (cluster.isPrimary) {
          const numCPUs = os.cpus().length
          for (let i = 0; i < numCPUs; i++) cluster.fork()
          cluster.on('exit', (worker) => {
            console.log(`Worker ${worker.process.pid} died, restarting`)
            cluster.fork()
          })
        } else {
          const app = express()
          app.use(express.json())
          app.get('/health', (_req, res) => res.json({ pid: process.pid }))
          app.listen(3000)
        }
    metric_explanations:
      concurrent-connections:
        reason: Cluster mode spawns one worker per CPU core, distributing incoming connections across processes and multiplying effective concurrency.
        contributing_factors:
          - OS round-robin load balances connections across worker processes
          - Each worker has its own event loop for independent request handling
          - Worker restart on crash maintains availability during failures
      cpu-efficiency:
        reason: Cluster mode utilizes all available CPU cores, improving CPU efficiency for compute-heavy workloads compared to single-process.
        contributing_factors:
          - One worker process per CPU core maximizes hardware utilization
          - CPU-bound work in one worker does not block other workers
          - Worker count can be tuned above CPU count for I/O-heavy workloads
connection_properties:
  protocol: HTTP
  communication_patterns:
    - request-response
    - server-sent-events
  typical_latency: 5-50ms
  co_location_potential: false
demand_responses:
  traffic-volume:
    high:
      request-latency: 0.7
      cpu-efficiency: 0.7
    extreme:
      request-latency: 0.5
      cpu-efficiency: 0.5
      concurrent-connections: 0.7
  concurrent-users:
    high:
      concurrent-connections: 0.7
      cpu-efficiency: 0.8
    extreme:
      concurrent-connections: 0.5
      cpu-efficiency: 0.6
      request-latency: 0.7
  burst-pattern:
    periodic-spikes:
      request-latency: 0.8
      concurrent-connections: 0.8
    unpredictable:
      request-latency: 0.6
      concurrent-connections: 0.6
