id: fintech-payment
name: "FinTech Payment Processing"
description: "PCI-compliant payment processing architecture with a payment orchestrator routing transactions across multiple providers for redundancy. PostgreSQL primary-replica ensures ACID-compliant transaction records with read scaling. Redis caches idempotency keys to prevent duplicate charges. Nginx terminates TLS and rate-limits incoming requests. Trades operational complexity and orchestrator latency for provider failover resilience and strict compliance guarantees."
tier: 3
skeleton:
  schema_version: "2.0.0"
  name: "FinTech Payment Processing"
  nodes:
    - id: ftp-nginx
      component_id: nginx
      config_variant_id: reverse-proxy
      position:
        x: 0
        y: 250
    - id: ftp-app
      component_id: node-express
      config_variant_id: single-process
      position:
        x: 350
        y: 250
    - id: ftp-pgw
      component_id: payment-gateway
      config_variant_id: payment-orchestrator
      position:
        x: 700
        y: 100
    - id: ftp-db
      component_id: postgresql
      config_variant_id: primary-replica
      position:
        x: 700
        y: 400
    - id: ftp-cache
      component_id: redis-cache
      config_variant_id: simple-cache
      position:
        x: 1050
        y: 250
  edges:
    - id: ftp-edge-nginx-app
      source_node_id: ftp-nginx
      target_node_id: ftp-app
    - id: ftp-edge-app-pgw
      source_node_id: ftp-app
      target_node_id: ftp-pgw
    - id: ftp-edge-app-db
      source_node_id: ftp-app
      target_node_id: ftp-db
    - id: ftp-edge-pgw-cache
      source_node_id: ftp-pgw
      target_node_id: ftp-cache
    - id: ftp-edge-db-cache
      source_node_id: ftp-db
      target_node_id: ftp-cache
