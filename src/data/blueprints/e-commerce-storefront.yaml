id: e-commerce-storefront
name: "E-Commerce Storefront"
description: "Read-heavy product catalog architecture with multi-tier caching. CDN serves static assets at the edge, Redis absorbs repeat product-page lookups, read replicas handle catalog queries. Write path (checkout, inventory) goes through the primary only. Trades higher operational complexity and cache-invalidation risk for extreme read throughput and low database load."
tier: 2
skeleton:
  schema_version: "2.0.0"
  name: "E-Commerce Storefront"
  nodes:
    - id: ec-cdn
      component_id: cloudflare-cdn
      config_variant_id: static-caching
      position:
        x: 0
        y: 250
    - id: ec-nginx
      component_id: nginx
      config_variant_id: reverse-proxy
      position:
        x: 250
        y: 250
    - id: ec-app
      component_id: node-express
      config_variant_id: cluster-mode
      position:
        x: 500
        y: 250
    - id: ec-cache
      component_id: redis-cache
      config_variant_id: distributed-cache
      position:
        x: 750
        y: 100
    - id: ec-db
      component_id: postgresql
      config_variant_id: primary-replica
      position:
        x: 750
        y: 400
  edges:
    - id: ec-edge-cdn-nginx
      source_node_id: ec-cdn
      target_node_id: ec-nginx
    - id: ec-edge-nginx-app
      source_node_id: ec-nginx
      target_node_id: ec-app
    - id: ec-edge-app-cache
      source_node_id: ec-app
      target_node_id: ec-cache
    - id: ec-edge-app-db
      source_node_id: ec-app
      target_node_id: ec-db
